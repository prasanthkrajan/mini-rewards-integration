<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Rewards Integration</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .content {
      padding: 30px;
    }

    .auth-section {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
    }

    .auth-section h2 {
      font-size: 16px;
      margin-bottom: 15px;
      color: #333;
    }

    .auth-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="number"] {
      flex: 1;
      min-width: 150px;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .status {
      font-size: 13px;
      color: #667eea;
      margin-left: 10px;
    }

    .balance-section {
      background: #f0f7ff;
      border-left: 4px solid #667eea;
      padding: 20px;
      border-radius: 6px;
      margin-bottom: 30px;
      text-align: center;
    }

    .balance-section h2 {
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .balance-value {
      font-size: 48px;
      font-weight: bold;
      color: #667eea;
    }

    .rewards-section h2 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #333;
    }

    .rewards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }

    .reward-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .reward-card:hover {
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
      transform: translateY(-4px);
    }

    .reward-card h3 {
      font-size: 16px;
      color: #333;
      margin-bottom: 8px;
    }

    .reward-card p {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
      min-height: 36px;
    }

    .reward-cost {
      display: inline-block;
      background: #f0f7ff;
      color: #667eea;
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .reward-card button {
      width: 100%;
      padding: 10px;
      font-size: 13px;
    }

    .message {
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .message.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    .empty-state {
      text-align: center;
      color: #999;
      padding: 40px 20px;
    }

    .empty-state p {
      font-size: 14px;
    }

    .loading {
      text-align: center;
      color: #999;
      padding: 20px;
    }

    @media (max-width: 600px) {
      .auth-form {
        flex-direction: column;
      }

      input[type="number"] {
        width: 100%;
      }

      button {
        width: 100%;
      }

      .status {
        margin-left: 0;
        margin-top: 10px;
      }

      .rewards-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>💰 Rewards</h1>
      <p>Earn and redeem points from your favorite partners</p>
    </header>

    <div class="content">
      <!-- Auth Section -->
      <div class="auth-section">
        <h2>👤 Login</h2>
        <div class="auth-form" style="flex-direction: column; align-items: stretch; gap: 10px;">
          <input
            type="email"
            id="emailInput"
            placeholder="Enter your email"
          >
          <input
            type="password"
            id="passwordInput"
            placeholder="Enter your password"
          >
          <button onclick="login()" style="width: 100%;">Login</button>
          <span class="status" id="authStatus"></span>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages"></div>

      <!-- Balance Section -->
      <div class="balance-section" id="balanceSection" style="display: none;">
        <h2>Your Current Balance</h2>
        <div class="balance-value" id="balanceValue">-</div>
      </div>

      <!-- Rewards Section -->
      <div class="rewards-section" id="rewardsSection" style="display: none;">
        <h2>Available Rewards</h2>
        <div class="rewards-grid" id="rewardsList"></div>
      </div>

      <div id="emptyState" class="empty-state" style="display: none;">
        <p>👉 Enter your email and password to get started</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000';
    let currentUserId = null;
    let currentUserEmail = null;
    let currentBalance = 0;
    let authToken = null;

    async function login() {
      const emailInput = document.getElementById('emailInput');
      const passwordInput = document.getElementById('passwordInput');
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        showMessage('Please enter both email and password', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Login failed');
        }

        const data = await response.json();
        authToken = data.token;
        currentUserId = data.user.id;
        currentUserEmail = data.user.email;

        // Clear password input for security
        passwordInput.value = '';

        document.getElementById('authStatus').textContent = `Logged in as ${data.user.email}`;
        document.getElementById('emptyState').style.display = 'none';

        loadBalance();
        loadRewards();
      } catch (error) {
        showMessage(`Login failed: ${error.message}`, 'error');
      }
    }

    async function loadBalance() {
      try {
        const response = await fetch(`${API_BASE}/me/balance`, {
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });

        if (!response.ok) throw new Error('Failed to load balance');

        const data = await response.json();
        currentBalance = data.balance;
        document.getElementById('balanceValue').textContent = data.balance;
        document.getElementById('balanceSection').style.display = 'block';
      } catch (error) {
        showMessage(`Error loading balance: ${error.message}`, 'error');
      }
    }

    async function loadRewards() {
      try {
        const response = await fetch(`${API_BASE}/rewards`);
        if (!response.ok) throw new Error('Failed to load rewards');

        const rewards = await response.json();
        displayRewards(rewards);
      } catch (error) {
        showMessage(`Error loading rewards: ${error.message}`, 'error');
      }
    }

    function displayRewards(rewards) {
      const rewardsList = document.getElementById('rewardsList');
      rewardsList.innerHTML = '';

      if (rewards.length === 0) {
        rewardsList.innerHTML = '<p style="color: #999;">No rewards available</p>';
        return;
      }

      rewards.forEach(reward => {
        const canRedeem = currentBalance >= reward.points_required;
        const card = document.createElement('div');
        card.className = 'reward-card';
        card.innerHTML = `
          <h3>${reward.name}</h3>
          <p>${reward.description || 'A great reward'}</p>
          <div class="reward-cost">${reward.points_required} points</div>
          <button
            onclick="redeemReward(${reward.id}, '${reward.name}', ${reward.points_required})"
            ${!canRedeem ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}
          >
            ${canRedeem ? 'Redeem' : 'Not Enough Points'}
          </button>
        `;
        rewardsList.appendChild(card);
      });

      document.getElementById('rewardsSection').style.display = 'block';
    }

    async function redeemReward(rewardId, rewardName, pointsCost) {
      if (!authToken) {
        showMessage('Please login first', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/rewards/${rewardId}/redeem`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Redemption failed');
        }

        const data = await response.json();
        showMessage(`✅ Successfully redeemed "${rewardName}"! New balance: ${data.new_balance} points`, 'success');

        // Refresh balance
        currentBalance = data.new_balance;
        document.getElementById('balanceValue').textContent = data.new_balance;

        // Reload rewards to update button states
        loadRewards();
      } catch (error) {
        showMessage(`Error redeeming reward: ${error.message}`, 'error');
      }
    }

    function showMessage(text, type) {
      const messagesDiv = document.getElementById('messages');
      const message = document.createElement('div');
      message.className = `message ${type}`;
      message.textContent = text;
      messagesDiv.appendChild(message);

      setTimeout(() => message.remove(), 5000);
    }

    // Show empty state on load
    document.getElementById('emptyState').style.display = 'block';
  </script>
</body>
</html>
